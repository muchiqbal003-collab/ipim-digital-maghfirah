<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPIM ACADEMY</title>

    <link rel="manifest" href="manifest.json">
<link rel="icon" href="images/icon-192.png">
<meta name="theme-color" content="#0d7c3b">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IPIM Absensi">

<link rel="apple-touch-icon" href="images/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #0d7c3b; --green-light: #10b34a; --green-pale: #e8f5e9; --green-dark: #0a5c2b;
            --orange: #f48120; --orange-light: #ffa94d; --orange-pale: #fff3e0;
            --white: #ffffff; --bg: #f5f6f8; --card: #ffffff;
            --text: #1a1a2e; --text-light: #6b7280; --text-lighter: #9ca3af;
            --border: #e5e7eb; --danger: #dc2626; --danger-light: #fef2f2;
            --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 250px; --sidebar-collapsed: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg); display: flex; min-height: 100vh;
            color: var(--text); -webkit-font-smoothing: antialiased;
        }

        /* SPINNER */
        .spinner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-card { background: white; padding: 32px; border-radius: var(--radius); max-width: 550px; width: 90%; box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; max-height: 85vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-card h3 { margin-bottom: 20px; color: var(--text); font-size: 1.2em; font-weight: 700; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); background: var(--white); position: fixed; height: 100vh; left: 0; top: 0; z-index: 1000; transition: var(--transition); display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
        .sidebar.collapsed { width: var(--sidebar-collapsed); padding: 0; }
        .sidebar-header { padding: 20px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .hamburger { background: none; border: none; color: var(--text); font-size: 1.4em; cursor: pointer; padding: 6px; border-radius: 8px; transition: var(--transition); display: flex; }
        .hamburger:hover { background: var(--bg); }
        .sidebar-brand { font-weight: 800; font-size: 1.15em; white-space: nowrap; color: var(--green); letter-spacing: -0.5px; }
        .sidebar-brand span { color: var(--orange); }
        .sidebar.collapsed .sidebar-brand, .sidebar.collapsed .menu-text, .sidebar.collapsed .profil-text, .sidebar.collapsed .menu-section { display: none; }

        .profil-sidebar { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1em; color: white; min-width: 42px; overflow: hidden; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profil-text .nama { font-size: 0.88em; font-weight: 600; color: var(--text); line-height: 1.2; }
        .profil-text .role { font-size: 0.72em; color: var(--text-light); }

        .sidebar-menu { flex: 1; padding: 8px 0; overflow-y: auto; }
        .menu-section { padding: 10px 20px 4px; font-size: 0.68em; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-lighter); font-weight: 700; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; margin: 2px 10px; color: var(--text-light); cursor: pointer; transition: var(--transition); font-size: 0.85em; font-weight: 500; white-space: nowrap; border-radius: var(--radius-sm); }
        .menu-item:hover { background: var(--green-pale); color: var(--green); }
        .menu-item.active { background: var(--green-pale); color: var(--green); font-weight: 600; }
        .menu-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .menu-icon svg { width: 18px; height: 18px; stroke: currentColor; }

        .sidebar-footer { padding: 14px; border-top: 1px solid var(--border); }
        .btn-logout { width: 100%; padding: 10px; background: #fff5f5; color: #dc2626; border: 1px solid #fecaca; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.83em; font-weight: 500; transition: var(--transition); font-family: inherit; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-logout:hover { background: #fef2f2; }

        /* OVERLAY MOBILE */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }

        /* MAIN */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 28px 32px; transition: var(--transition); min-height: 100vh; width: 100%; }
        .main-content.expanded { margin-left: var(--sidebar-collapsed); }
        .page-content { animation: fadeSlideIn 0.4s ease; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .top-bar h1 { font-size: 1.6em; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .top-bar .breadcrumb { color: var(--text-light); font-size: 0.83em; margin-top: 2px; }
        .top-bar .date { color: var(--text-light); font-size: 0.83em; background: var(--card); padding: 8px 14px; border-radius: 20px; box-shadow: var(--shadow-sm); white-space: nowrap; }

        .semester-badge { display: inline-block; background: var(--green-pale); color: var(--green); padding: 7px 16px; border-radius: 20px; font-weight: 600; font-size: 0.8em; margin-bottom: 16px; cursor: pointer; transition: var(--transition); }
        .semester-badge:hover { background: var(--green); color: white; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border); transition: var(--transition); position: relative; overflow: hidden; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-value { font-size: 2em; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
        .stat-card .stat-label { font-size: 0.78em; color: var(--text-light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .stat-card .stat-icon svg { width: 22px; height: 22px; }
        .stat-icon.green { background: var(--green-pale); }
        .stat-icon.green svg { stroke: var(--green); }
        .stat-icon.orange { background: var(--orange-pale); }
        .stat-icon.orange svg { stroke: var(--orange); }
        .stat-icon.blue { background: #e3f2fd; }
        .stat-icon.blue svg { stroke: #1565c0; }
        .stat-icon.red { background: #ffebee; }
        .stat-icon.red svg { stroke: #c62828; }

        /* CARDS */
        .card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        .card h3 { font-size: 1.05em; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 2px solid var(--green-pale); justify-content: space-between; }
        .card-header { display: flex; align-items: center; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* TABLE */
        .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        thead { background: #f9fafb; }
        th { padding: 12px 14px; text-align: left; font-weight: 600; color: var(--text-light); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        td { padding: 10px 14px; border-top: 1px solid var(--border); color: var(--text); }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #fafdfa; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.72em; font-weight: 600; }
        .badge-success { background: #ecfdf5; color: #065f46; }
        .badge-warning { background: #fffbeb; color: #92400e; }
        .badge-info { background: #eff6ff; color: #1e40af; }
        .badge-purple { background: #f5f3ff; color: #5b21b6; }
        .badge-danger { background: #fef2f2; color: #991b1b; }
        .text-center { text-align: center; }
        .text-danger { color: #dc2626; font-weight: 600; }
        .text-success { color: #059669; font-weight: 600; }

        /* BUTTONS */
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.83em; font-weight: 600; font-family: inherit; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-primary { background: var(--green); color: white; }
        .btn-primary:hover { background: var(--green-light); box-shadow: 0 4px 12px rgba(13,124,59,0.3); }
        .btn-outline { background: white; color: var(--green); border: 2px solid var(--green); }
        .btn-outline:hover { background: var(--green-pale); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--orange); color: white; }
        .btn-sm { padding: 5px 10px; font-size: 0.75em; border-radius: var(--radius-xs); }
        .btn-xs { padding: 3px 8px; font-size: 0.7em; border-radius: 4px; }
        .btn-icon { width: 30px; height: 30px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-xs); }
        .action-btns { display: flex; gap: 4px; }

        /* FORM */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.83em; color: var(--text); }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; transition: var(--transition); background: #fafafa; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); background: white; box-shadow: 0 0 0 3px rgba(13,124,59,0.08); }
        .input-mini { width: 70px !important; display: inline-block; text-align: center; padding: 5px !important; }

        /* JADWAL GRID */
        .jadwal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
        .jadwal-card-mini { background: var(--card); padding: 16px; border-radius: var(--radius-sm); border-left: 4px solid var(--green); box-shadow: var(--shadow-sm); transition: var(--transition); }
        .jadwal-card-mini:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .jadwal-card-mini .dosen-nama { font-weight: 600; color: var(--text); font-size: 0.88em; }
        .jadwal-card-mini .dosen-info { color: var(--text-light); font-size: 0.76em; margin-top: 2px; }

        /* LOGIN */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #f0fdf4 0%, #fff7ed 50%, #f5f6f8 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px 32px; border-radius: 24px; width: 400px; max-width: 90%; box-shadow: 0 25px 80px rgba(0,0,0,0.12); text-align: center; }
        .login-logo { width: 52px; height: 52px; background: linear-gradient(135deg, var(--green), var(--orange)); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: white; font-size: 1.4em; font-weight: 800; }
        .login-card h1 { font-size: 1.4em; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .login-card .subtitle { color: var(--text-light); margin-bottom: 24px; font-size: 0.88em; }
        .role-selector { display: flex; gap: 8px; margin-bottom: 20px; background: #f3f4f6; padding: 5px; border-radius: 12px; }
        .role-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.85em; transition: var(--transition); color: var(--text-light); }
        .role-btn.active { background: white; color: var(--green); box-shadow: var(--shadow-sm); }
        .pesan-error { background: #fef2f2; color: #991b1b; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 0.83em; display: none; }
        .btn-login { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--green), var(--green-light)); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: var(--transition); }
        .btn-login:hover { box-shadow: 0 8px 25px rgba(13,124,59,0.35); transform: translateY(-1px); }
        .btn-login:disabled { background: #d1d5db; cursor: not-allowed; transform: none; box-shadow: none; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 260px; z-index: 1001; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .main-content { margin-left: 0 !important; padding: 20px 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-card .stat-value { font-size: 1.5em; }
            .top-bar h1 { font-size: 1.3em; }
            .jadwal-grid { grid-template-columns: 1fr 1fr; }
            .modal-card { padding: 20px; }
            .btn { padding: 6px 12px; font-size: 0.78em; }
            table { font-size: 0.75em; }
            th, td { padding: 8px 10px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-card .stat-value { font-size: 1.3em; }
            .jadwal-grid { grid-template-columns: 1fr; }
            .login-card { padding: 28px 20px; }
        }

        /* MOBILE HEADER */
        .mobile-header { display: none; align-items: center; gap: 12px; margin-bottom: 16px; }
        .mobile-header .hamburger-mobile { background: none; border: none; font-size: 1.5em; cursor: pointer; padding: 4px; }
        @media (max-width: 768px) { .mobile-header { display: flex; } }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js')
        }
      </script>
</head>
<body>

    <!-- SPINNER -->
    <div class="spinner-overlay" id="spinner" style="display:none;"><div class="spinner"></div></div>

    <!-- SIDEBAR OVERLAY MOBILE -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- MODAL HAPUS -->
    <div class="modal-overlay" id="modalHapus" style="display:none;">
        <div class="modal-card"><h3>Konfirmasi Hapus</h3><p id="pesanHapus">Yakin ingin menghapus?</p>
            <div class="modal-buttons"><button class="btn btn-outline" onclick="tutupModal('modalHapus')">Batal</button><button class="btn btn-danger" id="btnKonfirmasiHapus">Ya, Hapus</button></div>
        </div>
    </div>

    <!-- MODAL FORM -->
    <div class="modal-overlay" id="modalForm" style="display:none;"><div class="modal-card" id="modalFormContent"></div></div>

    <!-- MODAL IMPORT -->
    <div class="modal-overlay" id="modalImport" style="display:none;">
        <div class="modal-card">
            <h3>Import Data</h3>
            <p style="margin-bottom:12px;color:var(--text-light);font-size:0.85em;">Pilih file Excel (.xlsx) untuk diimport</p>
            <input type="file" id="fileImport" accept=".xlsx,.xls" style="margin-bottom:12px;">
            <div id="previewImport" style="max-height:200px;overflow-y:auto;margin-bottom:12px;font-size:0.8em;"></div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="tutupModal('modalImport')">Batal</button>
                <button class="btn btn-primary" id="btnImport">Import</button>
            </div>
        </div>
    </div>

    <!-- MODAL LOGOUT -->
    <div class="modal-overlay" id="modalLogout" style="display:none;">
        <div class="modal-card"><h3>Konfirmasi Logout</h3><p>Apakah Anda yakin ingin keluar?</p>
            <div class="modal-buttons"><button class="btn btn-outline" onclick="tutupModal('modalLogout')">Batal</button><button class="btn btn-danger" onclick="konfirmasiLogout()">Ya, Keluar</button></div>
        </div>
    </div>

    <!-- LOGIN -->
    <div class="login-overlay" id="halamanLogin">
        <div class="login-card"><div class="login-logo">AD</div><h1>IPIM</h1><p class="subtitle">Sistem Manajemen Kehadiran Mahasiswa</p>
            <div class="role-selector"><button class="role-btn active" data-role="dosen" onclick="pilihRole('dosen',this)">Dosen</button><button class="role-btn" data-role="admin" onclick="pilihRole('admin',this)">Admin</button></div>
            <form id="formLogin"><div class="form-group"><input type="text" id="username" placeholder="Username" required></div><div class="form-group"><input type="password" id="password" placeholder="Password" required></div><div class="pesan-error" id="pesanError"></div><button type="submit" class="btn-login">Masuk</button></form>
        </div>
    </div>

    <!-- HALAMAN UTAMA -->
    <div id="halamanUtama" style="display:none;width:100%;">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><button class="hamburger" onclick="toggleSidebar()">☰</button><div class="sidebar-brand">IPIM<span>Digital</span></div></div>
            <div class="profil-sidebar"><div class="avatar" id="avatarSidebar" onclick="document.getElementById('uploadFoto').click()" title="Klik ganti foto">A</div><input type="file" id="uploadFoto" accept="image/*" style="display:none;" onchange="uploadFotoProfil(event)"><div class="profil-text"><div class="nama" id="namaSidebar">-</div><div class="role" id="roleSidebar">-</div></div></div>
            <div class="sidebar-menu" id="sidebarMenu"></div>
            <div class="sidebar-footer"><button class="btn-logout" onclick="bukaModal('modalLogout')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Keluar</button>
            </div>
        </div>

        <div class="main-content" id="mainContent">
            <div class="mobile-header"><button class="hamburger-mobile" onclick="openSidebar()">☰</button><span style="font-weight:700;color:var(--green);">Absensi<span style="color:var(--orange);">Digital</span></span></div>
            <div class="top-bar"><div><h1 id="judulHalaman">Dashboard</h1><div class="breadcrumb" id="breadcrumb">Beranda</div></div><div class="date" id="tanggalHari"></div></div>
            <div id="semesterBar"></div>
            <div id="contentArea" class="page-content"></div>
        </div>
    </div>

        async function uploadFotoProfil(event) {
            const file = event.target.files[0]
            if (!file || file.size > 2*1024*1024) { alert('Foto maksimal 2MB!'); return }
            showSpinner()
            const reader = new FileReader()
            reader.onload = async function(e) {
                const base64 = e.target.result
                if (currentUser.role === 'dosen') await db.from('dosen').update({ foto_url: base64 }).eq('id', currentUser.id)
                currentUser.foto_url = base64
                localStorage.setItem('user', JSON.stringify(currentUser))
                updateAvatar()
                hideSpinner()
            }
            reader.readAsDataURL(file)
        }

        // ==================== IMPORT/EXPORT ====================
        function openImport(type) {
            importType = type
            document.getElementById('fileImport').value = ''
            document.getElementById('previewImport').innerHTML = ''
            document.getElementById('btnImport').onclick = async () => {
                const file = document.getElementById('fileImport').files[0]
                if (!file) { alert('Pilih file!'); return }
                showSpinner()
                const reader = new FileReader()
                reader.onload = async function(e) {
                    const wb = XLSX.read(e.target.result, { type:'array' })
                    const ws = wb.Sheets[wb.SheetNames[0]]
                    const data = XLSX.utils.sheet_to_json(ws)
                    if (data.length === 0) { alert('Data kosong!'); hideSpinner(); return }
                    for (const row of data) {
                        if (importType === 'dosen') await db.from('dosen').insert([{ nama:row.nama||row.Nama||'', gelar:row.gelar||row.Gelar||'', username:row.username||row.Username||'', password:row.password||row.Password||'password123' }])
                        else if (importType === 'mahasiswa') await db.from('mahasiswa').insert([{ nim:String(row.nim||row.NIM||''), nama:row.nama||row.Nama||'', kelas_id:null }])
                    }
                    tutupModal('modalImport')
                    if (importType === 'dosen') loadPage('adminDosen')
                    else loadPage('adminMahasiswa')
                    hideSpinner()
                }
                reader.readAsArrayBuffer(file)
            }
            bukaModal('modalImport')
        }

        async function exportData(type) {
            showSpinner()
            let data, filename
            if (type === 'dosen') {
                const { data: d } = await db.from('dosen').select('nama, gelar, username').order('nama')
                data = d; filename = 'data_dosen.xlsx'
            } else {
                const { data: d } = await db.from('mahasiswa').select('nim, nama').order('nama')
                data = d; filename = 'data_mahasiswa.xlsx'
            }
            if (!data || data.length === 0) { alert('Tidak ada data!'); hideSpinner(); return }
            const ws = XLSX.utils.json_to_sheet(data)
            const wb = XLSX.utils.book_new()
            XLSX.utils.book_append_sheet(wb, ws, 'Data')
            XLSX.writeFile(wb, filename)
            hideSpinner()
        }

        async function formDosen(id = null) {
            let d = { nama:'', gelar:'', username:'', password:'' }; if (id) { const { data } = await db.from('dosen').select('*').eq('id', id).single(); if (data) d = data }
            openForm(id?'Edit Dosen':'Tambah Dosen', [
                { label:'Nama', id:'fnama', value:d.nama }, { label:'Gelar', id:'fgelar', value:d.gelar||'', placeholder:'Ustadz, Dr., dll' },
                { label:'Username', id:'fusername', value:d.username }, { label:'Password', id:'fpassword', type:'password', value:d.password||'', placeholder:id?'Kosongkan jika tidak diganti':'' }
            ], async () => {
                const payload = { nama:document.getElementById('fnama').value.trim(), gelar:document.getElementById('fgelar').value.trim(), username:document.getElementById('fusername').value.trim().toLowerCase() }
                const pass = document.getElementById('fpassword').value.trim(); if (pass) payload.password = pass
                if (!payload.nama || !payload.username) { alert('Nama dan Username wajib!'); return }
                showSpinner(); if (id) await db.from('dosen').update(payload).eq('id', id); else await db.from('dosen').insert([payload])
                tutupModal('modalForm'); loadPage('adminDosen')
            })
        }

        // ==================== ADMIN: REKAP & PERTEMUAN ====================
        async function adminRekap() {
            document.getElementById('judulHalaman').textContent = 'Rekap Absensi'; document.getElementById('breadcrumb').textContent = 'Admin / Rekap'
            const { data: jadwal } = await db.from('jadwal').select('id, min_kehadiran, max_pertemuan, dosen!inner(nama, gelar), mata_kuliah!inner(nama_mk)')
            const groups = {}
            jadwal?.forEach(j => { const key = `${j.mata_kuliah.nama_mk}|${j.dosen.nama}`; if (!groups[key]) groups[key] = { matkul:j.mata_kuliah.nama_mk, dosen:`${j.dosen.gelar||''} ${j.dosen.nama}`, ids:[], min:j.min_kehadiran||75, max:j.max_pertemuan||16 }; groups[key].ids.push(j.id) })
            let html = '<p style="margin-bottom:16px;color:var(--text-light);font-size:0.85em;">Pilih mata kuliah untuk melihat rekap kehadiran</p>'
            for (const key in groups) {
                const g = groups[key]
                const { data: absensi } = await db.from('absensi').select('mahasiswa_id, status, mahasiswa(nim, nama)').in('jadwal_id', g.ids)
                const rekap = {}
                absensi?.forEach(a => { const mid = a.mahasiswa_id; if (!rekap[mid]) rekap[mid] = { nim:a.mahasiswa?.nim, nama:a.mahasiswa?.nama, Hadir:g.max, Izin:0, Sakit:0, 'Jaga Malam':0, Alpha:0 }; if (rekap[mid][a.status] !== undefined) { rekap[mid][a.status]++; rekap[mid].Hadir-- } })
                const rows = Object.values(rekap); if (rows.length === 0) continue
                const safeKey = key.replace(/[^a-zA-Z]/g,'')
                html += `<div class="card"><h3><span>${g.matkul} — ${g.dosen}</span><span style="font-weight:400;font-size:0.7em;">Min: <input type="number" class="input-mini" id="min_${safeKey}" value="${g.min}" min="0" max="100">% <button class="btn btn-xs btn-primary" onclick="updateMin('${g.ids[0]}','${safeKey}')">Simpan</button></span></h3><button class="btn btn-outline btn-sm" style="margin-bottom:12px;" onclick="exportExcel('${safeKey}')">Download Excel</button><div class="table-wrap"><table id="tbl_${safeKey}"><thead><tr><th>NIM</th><th>Nama</th><th class="text-center">Hadir</th><th class="text-center">Izin</th><th class="text-center">Sakit</th><th class="text-center">Jaga Malam</th><th class="text-center">Alpha</th><th class="text-center">Tidak Hadir</th><th class="text-center">%</th></tr></thead><tbody>${rows.map(r => { const th = r.Izin+r.Sakit+r['Jaga Malam']+r.Alpha; const p = ((r.Hadir/g.max)*100).toFixed(1); return `<tr><td>${r.nim}</td><td>${r.nama}</td><td class="text-center"><span class="badge badge-success">${r.Hadir}</span></td><td class="text-center">${r.Izin||'-'}</td><td class="text-center">${r.Sakit||'-'}</td><td class="text-center">${r['Jaga Malam']||'-'}</td><td class="text-center">${r.Alpha||'-'}</td><td class="text-center ${th>3?'text-danger':''}">${th}</td><td class="text-center ${p>=g.min?'text-success':'text-danger'}">${p}%</td></tr>` }).join('')}</tbody></table></div></div>`
            }
            document.getElementById('contentArea').innerHTML = html || '<div class="card"><p style="text-align:center;">Belum ada data</p></div>'
        }

        function exportExcel(key) { const table = document.getElementById('tbl_'+key); if (!table) return; const ws = XLSX.utils.table_to_sheet(table); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Rekap'); XLSX.writeFile(wb, 'rekap_absensi.xlsx') }

            // Ambil komponen nilai
            const { data: komponen } = await db.from('komponen_nilai')
                .select('*')
                .eq('jadwal_id', jadwalId)
                .order('created_at')

            if (!komponen || komponen.length === 0) {
                hideSpinner()
                alert('Belum ada komponen penilaian!')
                return
            }

            // Ambil mahasiswa
            const { data: mahasiswa } = await db.from('mahasiswa')
                .select('id, nim, nama')
                .eq('kelas_id', jadwal.kelas_id)
                .order('nama')

            if (!mahasiswa || mahasiswa.length === 0) {
                hideSpinner()
                alert('Tidak ada mahasiswa di kelas ini!')
                return
            }

            // Hitung nilai akhir per mahasiswa
            let html = '<div style="max-height:500px;overflow-y:auto;"><table><thead><tr><th>NIM</th><th>Nama</th>'
            
            // Header kolom komponen
            let totalBobot = 0
            komponen.forEach(k => {
                html += '<th class="text-center">' + k.nama_komponen + '<br><small>(' + k.bobot + '%)</small></th>'
                totalBobot += k.bobot
            })
            html += '<th class="text-center">Nilai Akhir</th><th class="text-center">Grade</th></tr></thead><tbody>'

            // Ambil semua nilai
            const komponenIds = komponen.map(k => k.id)
            const { data: semuaNilai } = await db.from('nilai_mahasiswa')
                .select('*')
                .in('komponen_id', komponenIds)

            // Mapping nilai per mahasiswa per komponen
            const nilaiMap = {}
            semuaNilai?.forEach(n => {
                if (!nilaiMap[n.mahasiswa_id]) nilaiMap[n.mahasiswa_id] = {}
                nilaiMap[n.mahasiswa_id][n.komponen_id] = n.nilai
            })

            // Hitung per mahasiswa
            mahasiswa.forEach(m => {
                html += '<tr><td>' + m.nim + '</td><td>' + m.nama + '</td>'
                
                let nilaiAkhir = 0
                komponen.forEach(k => {
                    const nilai = nilaiMap[m.id]?.[k.id] || 0
                    html += '<td class="text-center">' + (nilai || '-') + '</td>'
                    if (totalBobot > 0) {
                        nilaiAkhir += (nilai * k.bobot) / totalBobot
                    }
                })

                nilaiAkhir = Math.round(nilaiAkhir * 100) / 100

                // Grade
                let grade = '-'
                let gradeColor = ''
                if (nilaiAkhir >= 85) { grade = 'A'; gradeColor = 'badge-success' }
                else if (nilaiAkhir >= 75) { grade = 'B'; gradeColor = 'badge-info' }
                else if (nilaiAkhir >= 65) { grade = 'C'; gradeColor = 'badge-warning' }
                else if (nilaiAkhir >= 50) { grade = 'D'; gradeColor = 'badge-danger' }
                else if (nilaiAkhir > 0) { grade = 'E'; gradeColor = 'badge-danger' }

                html += '<td class="text-center"><strong>' + (nilaiAkhir || '-') + '</strong></td>'
                html += '<td class="text-center"><span class="badge ' + gradeColor + '">' + grade + '</span></td>'
                html += '</tr>'
            })

            html += '</tbody></table></div>'
            html += '<p style="margin-top:12px;color:var(--text-light);font-size:0.8em;">Total Bobot: ' + totalBobot + '% | Rumus: (Nilai x Bobot) / ' + totalBobot + '</p>'
            html += '<div class="modal-buttons" style="margin-top:16px;"><button class="btn btn-outline" onclick="tutupModal(\'modalForm\')">Tutup</button></div>'

            document.getElementById('modalFormContent').innerHTML = '<h3>Rekap Nilai: ' + jadwal.mata_kuliah.nama_mk + ' - Kelas ' + jadwal.kelas.nama_kelas + '</h3>' + html
            bukaModal('modalForm')
            hideSpinner()
        }

            document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Semua Jadwal</h3><div style="display:flex;flex-wrap:wrap;gap:14px;">${data?.map(j => `<div style="background:#f9fafb;padding:16px;border-radius:10px;border-left:4px solid var(--green);min-width:240px;"><strong>${j.mata_kuliah?.nama_mk}</strong><p style="color:#6b7280;font-size:0.83em;">${j.hari} | ${j.jam_mulai?.substring(0,5)}-${j.jam_selesai?.substring(0,5)}</p><p style="color:#6b7280;font-size:0.83em;">Kelas ${j.kelas?.nama_kelas} | Max: ${j.max_pertemuan||16}</p></div>`).join('')||'<p>Belum ada</p>'}</div></div>`
        }

        // ==================== REKAP ====================
        async function dosenRekap() {
            document.getElementById('judulHalaman').textContent = 'Rekap Kehadiran'
            document.getElementById('breadcrumb').textContent = 'Dosen / Rekap'
            const { data: jadwal } = await db.from('jadwal')
                .select('id, min_kehadiran, max_pertemuan, mata_kuliah(nama_mk), kelas(nama_kelas)')
                .eq('dosen_id', currentUser.id)
                .order('hari')

            if (!jadwal || jadwal.length === 0) {
                document.getElementById('contentArea').innerHTML = '<div class="card"><p style="text-align:center;padding:30px;color:#9ca3af;">Belum ada jadwal</p></div>'
                return
            }

            const groups = {}
            jadwal.forEach(j => {
                const key = j.mata_kuliah.nama_mk
                if (!groups[key]) groups[key] = { matkul: key, ids: [], min: j.min_kehadiran || 75, max: j.max_pertemuan || 16 }
                groups[key].ids.push(j.id)
            })

            let html = '<p style="margin-bottom:16px;color:var(--text-light);font-size:0.85em;">Rekap kehadiran per mata kuliah yang diampu</p>'

            for (const key in groups) {
                const g = groups[key]
                
                const { data: absensi } = await db.from('absensi')
                    .select('mahasiswa_id, status, mahasiswa(nim, nama)')
                    .in('jadwal_id', g.ids)

                const rekap = {}
                absensi?.forEach(a => {
                    const mid = a.mahasiswa_id
                    if (!rekap[mid]) rekap[mid] = { 
                        nim: a.mahasiswa?.nim || '-', 
                        nama: a.mahasiswa?.nama || '-', 
                        Hadir: g.max, Izin: 0, Sakit: 0, 'Jaga Malam': 0, Alpha: 0 
                    }
                    if (rekap[mid][a.status] !== undefined) { 
                        rekap[mid][a.status]++
                        rekap[mid].Hadir-- 
                    }
                })

                const rows = Object.values(rekap)
                if (rows.length === 0) {
                    html += '<div class="card"><h3>' + g.matkul + '</h3><p style="text-align:center;color:#9ca3af;padding:20px;">Belum ada data absensi</p></div>'
                    continue
                }

                const totalHadir = rows.reduce((s, r) => s + r.Hadir, 0)
                const totalTidakHadir = rows.reduce((s, r) => s + r.Izin + r.Sakit + r['Jaga Malam'] + r.Alpha, 0)

                html += '<div class="card"><h3><span>' + g.matkul + '</span><span style="font-weight:400;font-size:0.7em;color:#6b7280;">' + rows.length + ' mahasiswa | Max ' + g.max + ' pertemuan | Min ' + g.min + '%</span></h3>'
                html += '<div style="margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap;"><span style="font-size:0.8em;">Hadir: <strong>' + totalHadir + '</strong></span><span style="font-size:0.8em;">Tidak Hadir: <strong>' + totalTidakHadir + '</strong></span></div>'
                html += '<div class="table-wrap"><table><thead><tr><th>NIM</th><th>Nama</th><th class="text-center">Hadir</th><th class="text-center">Izin</th><th class="text-center">Sakit</th><th class="text-center">Jaga Malam</th><th class="text-center">Alpha</th><th class="text-center">Total Tidak Hadir</th><th class="text-center">%</th></tr></thead><tbody>'

                rows.forEach(r => {
                    const th = r.Izin + r.Sakit + r['Jaga Malam'] + r.Alpha
                    const p = ((r.Hadir / g.max) * 100).toFixed(1)
                    const lulus = p >= g.min
                    html += '<tr><td>' + r.nim + '</td><td>' + r.nama + '</td><td class="text-center"><span class="badge badge-success">' + r.Hadir + '</span></td><td class="text-center">' + (r.Izin || '-') + '</td><td class="text-center">' + (r.Sakit || '-') + '</td><td class="text-center">' + (r['Jaga Malam'] || '-') + '</td><td class="text-center">' + (r.Alpha || '-') + '</td><td class="text-center ' + (th > 3 ? 'text-danger' : '') + '">' + th + '</td><td class="text-center ' + (lulus ? 'text-success' : 'text-danger') + '">' + p + '%</td></tr>'
                })

                html += '</tbody></table></div></div>'
            }

            document.getElementById('contentArea').innerHTML = html
        }
        
                // ==================== ADMIN NOTIFIKASI ====================
                async function adminNotifikasi() {
            document.getElementById('judulHalaman').textContent = 'Kirim Notifikasi'
            document.getElementById('breadcrumb').textContent = 'Admin / Notifikasi'

            let html = '<div class="card"><h3>Kirim Notifikasi ke Semua Dosen</h3>'
            html += '<div class="form-group"><label>Judul</label><input type="text" id="njudul" placeholder="Contoh: Perubahan Jadwal"></div>'
            html += '<div class="form-group"><label>Pesan</label><textarea id="npesan" rows="4" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-family:inherit;" placeholder="Isi pesan..."></textarea></div>'
            html += '<button class="btn btn-primary" onclick="kirimNotifikasi()">Kirim Notifikasi</button></div>'

            const { data: notif } = await db.from('notifikasi').select('*').order('created_at', { ascending: false }).limit(20)
            html += '<div class="card"><h3>Riwayat Notifikasi</h3>'
            if (notif && notif.length > 0) {
                html += '<div class="table-wrap"><table><thead><tr><th>Judul</th><th>Pesan</th><th>Tanggal</th></tr></thead><tbody>'
                notif.forEach(n => {
                    html += '<tr><td><strong>' + n.judul + '</strong></td><td>' + (n.pesan || '-') + '</td><td>' + new Date(n.created_at).toLocaleString('id-ID') + '</td></tr>'
                })
                html += '</tbody></table></div>'
            } else {
                html += '<p style="color:#9ca3af;">Belum ada notifikasi</p>'
            }
            html += '</div>'
            document.getElementById('contentArea').innerHTML = html
        }

        async function kirimNotifikasi() {
            const judul = document.getElementById('njudul').value.trim()
            const pesan = document.getElementById('npesan').value.trim()
            if (!judul) { alert('Judul wajib!'); return }
            showSpinner()
            await db.from('notifikasi').insert([{ judul, pesan }])
            hideSpinner()
            alert('Notifikasi terkirim!')
            loadPage('adminNotifikasi')
        }

        // ==================== DOSEN NOTIFIKASI ====================
        async function dosenNotifikasi() {
            document.getElementById('judulHalaman').textContent = 'Notifikasi'
            document.getElementById('breadcrumb').textContent = 'Dosen / Notifikasi'
            const { data } = await db.from('notifikasi').select('*').order('created_at', { ascending: false }).limit(50)
            let html = '<p style="margin-bottom:16px;color:var(--text-light);">Pesan dari Admin</p>'
            if (!data || data.length === 0) {
                html += '<div class="card"><p style="text-align:center;padding:30px;color:#9ca3af;">Tidak ada notifikasi</p></div>'
            } else {
                data.forEach(n => {
                    html += '<div class="card" style="border-left:4px solid var(--orange);margin-bottom:12px;"><h3 style="border:none;margin-bottom:6px;padding-bottom:0;">' + n.judul + '</h3><p style="color:var(--text-light);margin-bottom:4px;">' + (n.pesan || '-') + '</p><small style="color:var(--text-lighter);">' + new Date(n.created_at).toLocaleString('id-ID') + '</small></div>'
                })
            }
            document.getElementById('contentArea').innerHTML = html
        }

        // ==================== DOSEN ALARM ====================
        async function dosenAlarm() {
            document.getElementById('judulHalaman').textContent = 'Alarm Pengingat'
            document.getElementById('breadcrumb').textContent = 'Dosen / Alarm'
            const { data: setting } = await db.from('setting_alarm').select('*').eq('dosen_id', currentUser.id).single()
            const alarmAktif = setting ? setting.alarm_aktif : true
            const menit = setting ? setting.menit_sebelum : 10
            let html = '<div class="card"><h3>Pengaturan Alarm</h3><p style="color:var(--text-light);margin-bottom:16px;">Alarm berbunyi sebelum jadwal mengajar</p>'
            html += '<div class="form-group"><label>Status</label><select id="alarmStatus" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;"><option value="true" ' + (alarmAktif?'selected':'') + '>Aktif</option><option value="false" ' + (!alarmAktif?'selected':'') + '>Nonaktif</option></select></div>'
            html += '<div class="form-group"><label>Menit Sebelum Mengajar</label><select id="alarmMenit" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;">'
            for (let i = 5; i <= 30; i += 5) html += '<option value="' + i + '" ' + (menit===i?'selected':'') + '>' + i + ' menit</option>'
            html += '</select></div>'
            html += '<button class="btn btn-primary" onclick="simpanAlarm()">Simpan</button> <button class="btn btn-outline" onclick="tesAlarm()">Tes Alarm</button></div>'
            document.getElementById('contentArea').innerHTML = html
        }

        async function simpanAlarm() {
            const aktif = document.getElementById('alarmStatus').value === 'true'
            const menit = parseInt(document.getElementById('alarmMenit').value)
            showSpinner()
            await db.from('setting_alarm').upsert({ dosen_id: currentUser.id, alarm_aktif: aktif, menit_sebelum: menit }, { onConflict: 'dosen_id' })
            hideSpinner()
            alert('Pengaturan disimpan!')
        }

        function tesAlarm() {
            if (!('Notification' in window)) {
                alert('Browser tidak mendukung notifikasi!')
                return
            }
            
            if (Notification.permission === 'granted') {
                new Notification('⏰ IPIM Absensi - Tes Alarm', { 
                    body: 'Ini adalah tes alarm! Anda memiliki jadwal mengajar.', 
                    icon: 'images/icon-192.png',
                    vibrate: [200, 100, 200]
                })
                alert('Notifikasi terkirim! Cek pojok atas layar HP/laptop kamu.')
            } else if (Notification.permission === 'denied') {
                alert('Notifikasi diblokir! Buka Settings > Site Settings > Notifications > Allow')
            } else {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        new Notification('⏰ IPIM Absensi - Alarm Siap!', { 
                            body: 'Kamu akan diingatkan sebelum jadwal mengajar.',
                            icon: 'images/icon-192.png'
                        })
                        alert('Alarm siap!')
                    } else {
                        alert('Izin notifikasi ditolak. Alarm tidak bisa berfungsi.')
                    }
                })
            }
        }
        function bukaAbsensi(jadwalId) { 
            localStorage.setItem('jadwalAktif', jadwalId)
            window.location.href = 'absensi.html' 
        }

        // ==================== LOGOUT ====================
        function konfirmasiLogout() { tutupModal('modalLogout'); logout() }
        function logout() { localStorage.removeItem('user'); localStorage.removeItem('jadwalAktif'); document.getElementById('halamanUtama').style.display = 'none'; document.getElementById('halamanLogin').style.display = 'flex'; document.getElementById('formLogin').reset(); document.getElementById('pesanError').style.display = 'none'; document.querySelector('.role-btn[data-role="dosen"]').click(); currentUser = null }

        const savedUser = localStorage.getItem('user')
        if (savedUser) { currentUser = JSON.parse(savedUser); currentRole = currentUser.role; tampilkanUtama() }
    </script>
