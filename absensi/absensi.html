<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Mahasiswa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .header h1 { color: #1a3c4a; font-size: 1.5em; }

        .btn-kembali {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
        }

        .btn-kembali:hover { background: #5a6268; }

        .info-card {
            background: #f0f7fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid #1a3c4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-card h3 { color: #1a3c4a; margin-bottom: 3px; }
        .info-card p { color: #666; font-size: 0.9em; }

        .pertemuan-info {
            text-align: right;
            background: #1a3c4a;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
        }

        .pertemuan-info .ke { font-size: 1.8em; font-weight: bold; line-height: 1; }
        .pertemuan-info .label { font-size: 0.75em; opacity: 0.8; }

        .alert-info {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            color: #e65100;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        thead { background: #1a3c4a; color: white; }
        th { padding: 12px 15px; text-align: left; font-size: 0.9em; }
        td { padding: 10px 15px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #f8f9fa; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-hadir { background: #d4edda; color: #155724; }
        .badge-izin { background: #fff3cd; color: #856404; }
        .badge-sakit { background: #cce5ff; color: #004085; }
        .badge-jaga { background: #e8daef; color: #6c3483; }
        .badge-alpha { background: #f8d7da; color: #721c24; }

        .btn-tidak-hadir {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: inherit;
        }

        .btn-tidak-hadir:hover { background: #c82333; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1a3c4a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 15px;
        }

        .btn-submit:hover { background: #0d2a35; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        .modal-content h3 { margin-bottom: 15px; color: #1a3c4a; }

        .modal-content select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .modal-content button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }

        .btn-simpan-status { background: #1a3c4a; color: white; }
        .btn-batal { background: #ddd; color: #333; }

        .pesan-sukses {
            display: none;
            text-align: center;
            padding: 20px;
            color: #155724;
            background: #d4edda;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 Absensi Mahasiswa</h1>
            <button class="btn-kembali" onclick="window.location.href='index.html'">⬅️ Kembali</button>
        </div>

        <!-- Info -->
        <div class="info-card">
            <div>
                <h3 id="namaMatkul">📚 Memuat...</h3>
                <p id="infoJadwal">⏰ Memuat...</p>
            </div>
            <div class="pertemuan-info">
                <div class="ke" id="pertemuanKe">-</div>
                <div class="label">Pertemuan ke</div>
            </div>
        </div>

        <!-- Alert -->
        <div class="alert-info">
            💡 <strong>Default semua HADIR.</strong> Klik hanya untuk mahasiswa yang <strong>TIDAK HADIR</strong>.
        </div>

        <!-- Input Materi -->
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 600; display: block; margin-bottom: 5px;">📖 Materi Hari Ini:</label>
            <input type="text" id="materi" placeholder="Contoh: Bab 3 - Tauhid" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit;">
        </div>

        <!-- Tabel -->
        <table id="tabelAbsensi">
            <thead>
                <tr>
                    <th>No</th>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="dataMahasiswa">
                <tr><td colspan="5" style="text-align: center; padding: 30px;">⏳ Memuat...</td></tr>
            </tbody>
        </table>

        <!-- Tombol -->
        <button class="btn-submit" id="btnSimpan" onclick="simpanAbsensi()">💾 Simpan Absensi</button>
        <div class="pesan-sukses" id="pesanSukses">✅ Absensi berhasil disimpan!</div>
    </div>

    <!-- Modal pilih status -->
    <div class="modal" id="modalStatus">
        <div class="modal-content">
            <h3>Pilih Status Ketidakhadiran</h3>
            <p id="modalNamaMhs" style="margin-bottom: 10px; font-weight: 600;"></p>
            <select id="selectStatus">
                <option value="Izin">📝 Izin</option>
                <option value="Sakit">🏥 Sakit</option>
                <option value="Jaga Malam">🌙 Jaga Malam</option>
                <option value="Alpha">❌ Alpha</option>
            </select>
            <button class="btn-simpan-status" onclick="konfirmasiStatus()">✅ Simpan</button>
            <button class="btn-batal" onclick="tutupModal()">Batal</button>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://mvhrnrvdhibdtvulmqkr.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12aHJucnZkaGliZHR2dWxtcWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTc5MjksImV4cCI6MjA5NDQ5MzkyOX0.IsS1wSXtGb0Keroc3UvsiVT38u-gea0_IVdAm1snBVw'

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        const jadwalId = localStorage.getItem('jadwalAktif')
        let dataJadwal = null
        let dataMahasiswa = []
        let mahasiswaTidakHadir = {} // {mahasiswa_id: status}
        let mhsDipilih = null
        let pertemuanKe = 1

        // ========================================
        // LOAD DATA
        // ========================================
        async function loadData() {
            if (!jadwalId) { window.location.href = 'index.html'; return; }

            // Ambil jadwal
            const { data: jadwal } = await db
                .from('jadwal')
                .select('id, jam_mulai, jam_selesai, ruangan, mata_kuliah(nama_mk), kelas(id, nama_kelas)')
                .eq('id', jadwalId)
                .single()

            if (!jadwal) { alert('Jadwal tidak ditemukan!'); window.location.href = 'index.html'; return; }
            dataJadwal = jadwal

            document.getElementById('namaMatkul').textContent = '📚 ' + jadwal.mata_kuliah.nama_mk
            document.getElementById('infoJadwal').textContent = 
                '🏫 Kelas: ' + jadwal.kelas.nama_kelas + 
                ' | ⏰ ' + jadwal.jam_mulai.substring(0,5) + ' - ' + jadwal.jam_selesai.substring(0,5) +
                ' | 📍 ' + (jadwal.ruangan || '-')

            // Cek pertemuan terakhir
            const { data: pertemuanData } = await db
                .from('pertemuan')
                .select('pertemuan_ke')
                .eq('jadwal_id', jadwalId)
                .order('pertemuan_ke', { ascending: false })
                .limit(1)

            pertemuanKe = (pertemuanData && pertemuanData.length > 0) ? pertemuanData[0].pertemuan_ke + 1 : 1
            document.getElementById('pertemuanKe').textContent = pertemuanKe

            // Ambil mahasiswa
            const { data: mhs } = await db
                .from('mahasiswa')
                .select('id, nim, nama')
                .eq('kelas_id', jadwal.kelas.id)
                .order('nama')

            dataMahasiswa = mhs || []
            renderTabel()
        }

        // ========================================
        // RENDER TABEL
        // ========================================
        function renderTabel() {
            const tbody = document.getElementById('dataMahasiswa')
            tbody.innerHTML = dataMahasiswa.map((m, i) => {
                const status = mahasiswaTidakHadir[m.id]
                let statusHtml = '<span class="status-badge badge-hadir">✅ Hadir</span>'
                let btnHtml = '<button class="btn-tidak-hadir" onclick="bukaModal(\'' + m.id + '\', \'' + m.nama.replace(/'/g, "\\'") + '\')">❌ Tidak Hadir</button>'

                if (status) {
                    const badgeClass = {
                        'Izin': 'badge-izin',
                        'Sakit': 'badge-sakit',
                        'Jaga Malam': 'badge-jaga',
                        'Alpha': 'badge-alpha'
                    }[status] || 'badge-alpha'
                    statusHtml = '<span class="status-badge ' + badgeClass + '">' + status + '</span>'
                    btnHtml = '<button style="background:#6c757d;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:0.8em;" onclick="bukaModal(\'' + m.id + '\', \'' + m.nama.replace(/'/g, "\\'") + '\')">✏️ Ganti</button>'
                }

                return `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${m.nim}</td>
                        <td>${m.nama}</td>
                        <td>${statusHtml}</td>
                        <td>${btnHtml}</td>
                    </tr>
                `
            }).join('')
        }

        // ========================================
        // MODAL
        // ========================================
        function bukaModal(mhsId, nama) {
            mhsDipilih = mhsId
            document.getElementById('modalNamaMhs').textContent = '👤 ' + nama
            document.getElementById('modalStatus').style.display = 'flex'
        }

        function tutupModal() {
            document.getElementById('modalStatus').style.display = 'none'
            mhsDipilih = null
        }

        function konfirmasiStatus() {
            const status = document.getElementById('selectStatus').value
            mahasiswaTidakHadir[mhsDipilih] = status
            tutupModal()
            renderTabel()
        }

        // ========================================
        // SIMPAN ABSENSI
        // ========================================
        async function simpanAbsensi() {
            const btn = document.getElementById('btnSimpan')
            const materi = document.getElementById('materi').value.trim()

            btn.disabled = true
            btn.textContent = '⏳ Menyimpan...'

            const today = new Date().toISOString().split('T')[0]

            // Simpan pertemuan
            const { data: pertemuan, error: errPert } = await db
                .from('pertemuan')
                .insert([{
                    jadwal_id: jadwalId,
                    pertemuan_ke: pertemuanKe,
                    tanggal: today,
                    materi: materi || null
                }])
                .select('id')
                .single()

            if (errPert) {
                alert('❌ Gagal menyimpan pertemuan!')
                btn.disabled = false
                btn.textContent = '💾 Simpan Absensi'
                return
            }

            // Simpan hanya yang tidak hadir
            const dataInsert = []
            for (const mhsId in mahasiswaTidakHadir) {
                dataInsert.push({
                    jadwal_id: jadwalId,
                    mahasiswa_id: mhsId,
                    tanggal: today,
                    status: mahasiswaTidakHadir[mhsId]
                })
            }

            if (dataInsert.length > 0) {
                const { error } = await db.from('absensi').insert(dataInsert)
                if (error) {
                    alert('❌ Gagal menyimpan absensi!')
                    btn.disabled = false
                    btn.textContent = '💾 Simpan Absensi'
                    return
                }
            }

            // Sukses
            const jumlahTidakHadir = Object.keys(mahasiswaTidakHadir).length
            const jumlahHadir = dataMahasiswa.length - jumlahTidakHadir

            document.getElementById('btnSimpan').style.display = 'none'
            document.getElementById('pesanSukses').style.display = 'block'
            document.getElementById('pesanSukses').innerHTML = 
                '✅ <strong>Pertemuan ' + pertemuanKe + ' berhasil disimpan!</strong><br>' +
                'Hadir: ' + jumlahHadir + ' | Tidak Hadir: ' + jumlahTidakHadir + '<br>' +
                '<small>Kembali ke dashboard dalam 3 detik...</small>'

            setTimeout(() => { window.location.href = 'index.html' }, 3000)
        }

        // Load
        loadData()
    </script>
</body>
</html>
